<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de usuarios desde JSON</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #aaa;
            padding: 8px;
            text-align: left;
        }
        th {
            background: #f0f0f0;
        }
        td[contenteditable="true"] {
            background-color: #fff8dc;
        }
        button {
            margin: 4px;
        }
    </style>
</head>
<body>
    <h2>Gestor de usuarios desde JSON</h2>

    <!-- Formulario para agregar usuarios -->
    <form id="formUsuario">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required><br><br>
        
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo" required><br><br>
        
        <button type="submit">Guardar</button>
    </form>

    <br>

    <!-- Importar usuarios desde un archivo JSON -->
    <input type="file" id="importarJSON" accept=".json">
    
    <!-- Descargar JSON -->
    <button id="descargarBtn">Descargar JSON</button>

    <hr>
    <h3>Usuarios registrados:</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Correo electrónico</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaUsuarios">
            <!-- Aquí se agregarán los usuarios registrados -->
        </tbody>
    </table>

    <!-- Vinculación del script -->
    <script src="app.js"></script>
</body>
</html>
